<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PreDentTX | Reset Password</title>
    <style>
        :root { --primary-green: #0A5C36; --primary-gold: #D4AF37; --off-white: #F8F9FA; --dark-text: #333333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: var(--off-white); display: flex; justify-content: center; align-items: center; height: 100vh; }
        .box { background-color: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; border-top: 8px solid var(--primary-green); }
        .box h1 { color: var(--primary-green); margin-bottom: 5px; }
        .box p { color: #666; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: var(--primary-green); color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #074226; }
        #status-message { font-size: 14px; margin-top: 15px; min-height: 18px; }
        #status-message.error { color: #c0392b; }
        #status-message.success { color: var(--primary-green); }
    </style>
</head>
<body>
    <div class="box">
        <h1>PreDentTX</h1>
        <p>Choose a new password</p>
        <input type="password" id="new-password" placeholder="New password" autocomplete="new-password">
        <button id="update-btn">Update Password</button>
        <p id="status-message"></p>
    </div>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { verifyPasswordResetCode, confirmPasswordReset } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-auth.js";

        const statusMessage = document.getElementById("status-message");
        const updateBtn = document.getElementById("update-btn");
        function setStatus(text, type) { statusMessage.innerText = text; statusMessage.className = type || ""; }

        const oobCode = new URLSearchParams(window.location.search).get("oobCode");

        if (!oobCode) {
            setStatus("This reset link is invalid or has expired. Request a new one from the login page.", "error");
            updateBtn.disabled = true;
        } else {
            try {
                await verifyPasswordResetCode(auth, oobCode);
            } catch (err) {
                setStatus("This reset link is invalid or has expired. Request a new one from the login page.", "error");
                updateBtn.disabled = true;
            }
        }

        updateBtn.addEventListener("click", async () => {
            const newPassword = document.getElementById("new-password").value;
            if (newPassword.length < 6) {
                setStatus("Password must be at least 6 characters.", "error");
                return;
            }
            setStatus("Updating...", "");
            try {
                await confirmPasswordReset(auth, oobCode, newPassword);
                setStatus("Password updated! Redirecting to login...", "success");
                setTimeout(() => window.location.href = "login.html", 1500);
            } catch (error) {
                setStatus(error.message, "error");
            }
        });
    </script>
</body>
</html>
