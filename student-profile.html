<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PreDentTX | My Profile</title>
    <style>
        :root { --green: #0A5C36; --gold: #D4AF37; --off-white: #F8F9FA; --dark: #333; --red: #e74c3c; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--off-white); color: var(--dark); display: flex; flex-direction: column; min-height: 100vh; }
        header { background: var(--green); padding: 18px 40px; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: var(--gold); font-size: 26px; font-weight: 700; text-decoration: none; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a { color: white; text-decoration: none; font-weight: 600; cursor: pointer; font-size: 15px; }
        .container { max-width: 860px; margin: 36px auto; padding: 0 20px 60px; flex: 1; }
        .welcome { display: flex; align-items: center; gap: 18px; margin-bottom: 28px; }
        .avatar-large { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--gold); background: #eee; background-size: cover; background-position: center; }
        .card { background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); padding: 28px; margin-bottom: 24px; border-top: 5px solid var(--gold); }
        .card h2 { margin: 0 0 18px; color: var(--dark); border-bottom: 2px solid var(--off-white); padding-bottom: 10px; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 13px; border: 1px solid #ccc; border-radius: 6px; font-family: inherit; font-size: 15px; box-sizing: border-box; }
        .row2 { display: flex; gap: 12px; }
        .row2 input { flex: 1; }
        @media (max-width: 600px) { .row2 { flex-direction: column; gap: 0; } }
        button { padding: 11px 20px; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; color: white; background: var(--green); font-size: 15px; }
        button:hover { background: #074226; }
        button:disabled { background: #aaa; cursor: not-allowed; }
        .avatar-zone { width: 76px; height: 76px; border-radius: 50%; border: 2px dashed var(--green); background: #fafafa; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; font-size: 10px; color: #888; text-align: center; flex-shrink: 0; margin-bottom: 14px; }
        .avatar-zone img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .strength-box { background: #f5f5f5; border-radius: 8px; padding: 14px 16px; margin-top: 14px; }
        .strength-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .strength-top span { font-size: 13px; font-weight: 700; color: #555; }
        .strength-bar-track { background: #ddd; border-radius: 10px; height: 10px; overflow: hidden; }
        .strength-bar-fill { height: 100%; border-radius: 10px; transition: width 0.4s, background 0.4s; }
        .strength-tips { font-size: 12px; color: #888; margin: 8px 0 0; }
        .app-card { border: 1px solid #eee; border-radius: 8px; padding: 16px 18px; margin-bottom: 12px; background: #fafafa; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .app-card-info h4 { margin: 0 0 3px; font-size: 16px; }
        .app-card-info p { margin: 0; font-size: 13px; color: #777; }
        .badge-submitted { background: #eaf2ee; color: var(--green); border: 1px solid var(--green); padding: 4px 10px; border-radius: 16px; font-size: 12px; font-weight: 700; white-space: nowrap; }
        .empty { color: #aaa; font-style: italic; }
        footer { background: var(--green); color: white; text-align: center; padding: 18px; font-size: 13px; margin-top: auto; }
        footer a { color: var(--gold); text-decoration: none; margin: 0 10px; }
    </style>
</head>
<body>
<header>
    <a href="index.html" class="logo">PreDentTX</a>
    <div class="nav-links">
        <a href="index.html">Browse Jobs</a>
        <a id="logout-btn">Logout</a>
    </div>
</header>
<div class="container">
    <div class="welcome">
        <div class="avatar-large" id="avatar-large"></div>
        <div>
            <h1 id="welcome-title" style="margin:0 0 4px; color:var(--green); font-size:26px;">My Profile</h1>
            <p style="margin:0; color:#888; font-size:14px;">Manage your profile and track your applications.</p>
        </div>
    </div>
    <div class="card">
        <h2>My Profile</h2>
        <div style="display:flex; gap:16px; align-items:flex-start; margin-bottom:8px;">
            <div class="avatar-zone" id="avatar-zone">
                <span id="avatar-prompt">Click to add photo</span>
                <input type="file" id="avatar-input" accept="image/*" style="display:none;">
                <img id="avatar-img" src="" alt="">
            </div>
            <div style="flex:1;">
                <div class="row2">
                    <input type="text" id="first-name" placeholder="First Name" oninput="updateStrength()">
                    <input type="text" id="last-name" placeholder="Last Name" oninput="updateStrength()">
                </div>
                <input type="text" id="school" placeholder="Undergraduate University (e.g., UT Austin)" oninput="updateStrength()">
            </div>
        </div>
        <input type="text" id="preferred-city" placeholder="Your city in Texas (for weekly job digest — e.g., Austin)" oninput="updateStrength()">
        <textarea id="bio" rows="3" placeholder="Short bio for employers..." style="resize:none;" oninput="updateStrength()"></textarea>
        <button id="save-btn">Save Profile</button>
        <p id="save-status" style="color:var(--green); font-weight:700; margin:10px 0 0;"></p>
        <div class="strength-box">
            <div class="strength-top">
                <span>Profile Strength</span>
                <span id="strength-pct" style="color:var(--red);">0%</span>
            </div>
            <div class="strength-bar-track">
                <div class="strength-bar-fill" id="strength-bar" style="width:0%; background:var(--red);"></div>
            </div>
            <p class="strength-tips" id="strength-tips"></p>
        </div>
    </div>
    <div class="card">
        <h2>My Applications</h2>
        <div id="apps-list"><p class="empty">Loading your applications...</p></div>
    </div>
</div>
<footer>
    <p style="margin:0 0 8px;">&copy; 2026 PreDentTX. All rights reserved.</p>
    <a href="privacy.html">Privacy Policy</a>
    <a href="privacy.html#terms">Terms of Service</a>
</footer>
<script type="module">
    import { auth, db, uploadMedia, escapeHtml } from './firebase-config.js';
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-auth.js";
    import { doc, getDoc, setDoc, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore.js";

    let currentUid = "";
    let currentEmail = "";
    let picUrl = "";

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = "login.html"; return; }
        if (!user.emailVerified) { alert("Please verify your email first."); window.location.href = "login.html"; return; }
        currentUid = user.uid;
        currentEmail = user.email;
        const snap = await getDoc(doc(db, "users", user.uid));
        if (snap.exists()) {
            const d = snap.data();
            document.getElementById("first-name").value = d.firstName || "";
            document.getElementById("last-name").value = d.lastName || "";
            document.getElementById("school").value = d.school || "";
            document.getElementById("preferred-city").value = d.preferredCity || "";
            document.getElementById("bio").value = d.bio || "";
            if (d.firstName) document.getElementById("welcome-title").innerText = `Welcome, ${d.firstName}`;
            if (d.profilePic) {
                picUrl = d.profilePic;
                document.getElementById("avatar-large").style.backgroundImage = `url('${picUrl}')`;
                document.getElementById("avatar-img").src = picUrl;
                document.getElementById("avatar-img").style.display = "block";
                document.getElementById("avatar-prompt").style.display = "none";
            } else {
                document.getElementById("avatar-large").style.backgroundImage = `url('https://api.dicebear.com/7.x/fun-emoji/svg?seed=${user.uid}')`;
            }
        }
        window.updateStrength();
        loadApplications(user.uid);
    });

    const avatarZone = document.getElementById("avatar-zone");
    const avatarInput = document.getElementById("avatar-input");
    avatarZone.addEventListener("click", () => avatarInput.click());
    avatarInput.addEventListener("change", async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 5 * 1024 * 1024) { alert("Image must be under 5MB."); return; }
        document.getElementById("avatar-img").src = URL.createObjectURL(file);
        document.getElementById("avatar-img").style.display = "block";
        document.getElementById("avatar-prompt").style.display = "none";
        try { picUrl = await uploadMedia(currentUid, "avatar", file); window.updateStrength(); }
        catch (err) { alert("Upload failed: " + err.message); }
    });

    document.getElementById("save-btn").addEventListener("click", async () => {
        const btn = document.getElementById("save-btn");
        const status = document.getElementById("save-status");
        btn.disabled = true; status.innerText = "Saving...";
        const firstName = document.getElementById("first-name").value.trim();
        try {
            await setDoc(doc(db, "users", currentUid), {
                firstName, lastName: document.getElementById("last-name").value.trim(),
                school: document.getElementById("school").value.trim(),
                preferredCity: document.getElementById("preferred-city").value.trim().toLowerCase(),
                bio: document.getElementById("bio").value.trim(),
                profilePic: picUrl, email: currentEmail, role: "student"
            }, { merge: true });
            status.innerText = "Profile saved!";
            if (firstName) document.getElementById("welcome-title").innerText = `Welcome, ${firstName}`;
            if (picUrl) document.getElementById("avatar-large").style.backgroundImage = `url('${picUrl}')`;
            window.updateStrength();
        } catch (err) { status.innerText = "Error: " + err.message; }
        finally { btn.disabled = false; }
    });

    window.updateStrength = function() {
        const checks = [
            { done: document.getElementById("first-name").value.trim().length > 0, tip: "Add your first name" },
            { done: document.getElementById("last-name").value.trim().length > 0, tip: "Add your last name" },
            { done: document.getElementById("school").value.trim().length > 0, tip: "Add your university" },
            { done: document.getElementById("preferred-city").value.trim().length > 0, tip: "Add your city" },
            { done: document.getElementById("bio").value.trim().length > 0, tip: "Write a short bio" },
            { done: !!picUrl, tip: "Add a profile photo" },
        ];
        const done = checks.filter(c => c.done).length;
        const pct = Math.round((done / checks.length) * 100);
        const color = pct < 40 ? "#e74c3c" : pct < 80 ? "#f39c12" : "#0A5C36";
        document.getElementById("strength-bar").style.width = pct + "%";
        document.getElementById("strength-bar").style.background = color;
        document.getElementById("strength-pct").innerText = pct + "%";
        document.getElementById("strength-pct").style.color = color;
        const missing = checks.filter(c => !c.done).map(c => c.tip);
        document.getElementById("strength-tips").innerText = missing.length ? "To improve: " + missing.join(" · ") : "Great profile! You are all set.";
    };

    async function loadApplications(uid) {
        const list = document.getElementById("apps-list");
        try {
            const q = query(collection(db, "applications"), where("studentId", "==", uid));
            const snap = await getDocs(q);
            if (snap.empty) { list.innerHTML = '<p class="empty">No applications yet. Browse jobs to get started!</p>'; return; }
            list.innerHTML = "";
            const apps = snap.docs.map(d => ({ id: d.id, ...d.data() }))
                .sort((a, b) => (b.timestamp || "").localeCompare(a.timestamp || ""));
            apps.forEach(app => {
                const date = app.timestamp ? new Date(app.timestamp).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }) : "";
                const div = document.createElement("div");
                div.className = "app-card";
                div.innerHTML = `
                    <div class="app-card-info">
                        <h4>${escapeHtml(app.jobTitle) || "Position"}</h4>
                        <p>${escapeHtml(app.employer) || ""}${date ? " &middot; Applied " + date : ""}</p>
                        ${app.resumeUrl ? `<a href="${escapeHtml(app.resumeUrl)}" target="_blank" rel="noopener" style="font-size:12px; color:var(--green);">View submitted resume</a>` : ""}
                    </div>
                    <span class="badge-submitted">Submitted</span>
                `;
                list.appendChild(div);
            });
        } catch (err) { list.innerHTML = `<p style="color:red;">Error: ${err.message}</p>`; }
    }

    document.getElementById("logout-btn").addEventListener("click", () => { signOut(auth).then(() => window.location.href = "index.html"); });
</script>
</body>
</html>
