<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PreDentTX | Login</title>
    <style>
        :root {
            --primary-green: #0A5C36;
            --primary-gold: #D4AF37;
            --off-white: #F8F9FA;
            --dark-text: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--off-white);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border-top: 8px solid var(--primary-green);
        }

        .login-box h1 { color: var(--primary-green); margin-bottom: 5px; }
        .login-box p { color: #666; margin-bottom: 30px; }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-green);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 10px;
        }

        button:hover { background-color: #074226; }
        button:disabled { background-color: #aaa; cursor: not-allowed; }
        .btn-secondary { background-color: var(--primary-gold); color: var(--dark-text); }
        .btn-secondary:hover { background-color: #b5952f; }

        .forgot-link {
            display: inline-block; margin-top: 5px; font-size: 13px;
            color: var(--primary-green); text-decoration: none; cursor: pointer;
        }
        .forgot-link:hover { text-decoration: underline; }

        #status-message { font-size: 14px; margin-top: 15px; min-height: 18px; }
        #status-message.error { color: #c0392b; }
        #status-message.success { color: var(--primary-green); }
    </style>
</head>
<body>

    <div class="login-box">
        <h1>PreDentTX</h1>
        <p>Secure Portal Login</p>

        <select id="user-role">
            <option value="student">I am a Predental Student</option>
            <option value="dentist">I am a Dentist / Orthodontist</option>
        </select>

        <input type="email" id="email" placeholder="Email Address" autocomplete="email">
        <input type="password" id="password" placeholder="Password" autocomplete="current-password">

        <button id="login-btn">Log In</button>
        <button id="signup-btn" class="btn-secondary">Create Account</button>

        <a class="forgot-link" id="forgot-link">Forgot your password?</a>

        <p id="status-message"></p>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import {
            createUserWithEmailAndPassword,
            signInWithEmailAndPassword,
            sendEmailVerification,
            sendPasswordResetEmail
        } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-auth.js";
        import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore.js";

        const roleInput = document.getElementById("user-role");
        const emailInput = document.getElementById("email");
        const passwordInput = document.getElementById("password");
        const statusMessage = document.getElementById("status-message");
        const loginBtn = document.getElementById("login-btn");
        const signupBtn = document.getElementById("signup-btn");

        function setStatus(text, type) {
            statusMessage.innerText = text;
            statusMessage.className = type || "";
        }
        function setBusy(busy) {
            loginBtn.disabled = busy;
            signupBtn.disabled = busy;
        }

        async function routeToDashboard(uid) {
            const userDoc = await getDoc(doc(db, "users", uid));
            const role = userDoc.exists() ? userDoc.data().role : "student";
            window.location.href = role === "dentist" ? "dentist-dashboard.html" : "student-profile.html";
        }

        signupBtn.addEventListener("click", async () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const role = roleInput.value;

            if (!email || !password) { setStatus("Please fill in all fields.", "error"); return; }
            if (password.length < 6) { setStatus("Password must be at least 6 characters.", "error"); return; }

            setBusy(true);
            setStatus("Creating account...", "");

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                await setDoc(doc(db, "users", user.uid), { email, role });
                await sendEmailVerification(user);

                setStatus("Account created! Check your email to confirm your address, then log in below.", "success");
                emailInput.value = "";
                passwordInput.value = "";
            } catch (error) {
                setStatus(error.message, "error");
            } finally {
                setBusy(false);
            }
        });

        loginBtn.addEventListener("click", async () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) { setStatus("Please fill in all fields.", "error"); return; }

            setBusy(true);
            setStatus("Logging in...", "");

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                if (!user.emailVerified) {
                    setStatus("Please verify your email before logging in — check your inbox, or click below to resend.", "error");
                    setBusy(false);
                    return;
                }

                await routeToDashboard(user.uid);
            } catch (error) {
                setStatus("Wrong email or password.", "error");
                setBusy(false);
            }
        });

        document.getElementById("forgot-link").addEventListener("click", async () => {
            const email = emailInput.value.trim();
            if (!email) {
                setStatus("Type your email above first, then click 'Forgot your password?'", "error");
                return;
            }
            setStatus("Sending reset link...", "");
            try {
                await sendPasswordResetEmail(auth, email, {
                    url: window.location.origin + "/reset-password.html",
                    handleCodeInApp: true
                });
                setStatus("Check your email for a password reset link.", "success");
            } catch (error) {
                setStatus(error.message, "error");
            }
        });
    </script>
</body>
</html>
