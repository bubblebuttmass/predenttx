<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PreDentTX | Login</title>
    <style>
        /* PreDentTX Green and Gold Theme */
        :root {
            --primary-green: #0A5C36;
            --primary-gold: #D4AF37;
            --off-white: #F8F9FA;
            --dark-text: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--off-white);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border-top: 8px solid var(--primary-green);
        }

        .login-box h1 { color: var(--primary-gold); margin-bottom: 5px; }
        .login-box p { color: #666; margin-bottom: 30px; }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-green);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 10px;
        }

        button:hover { background-color: #074226; }
        .btn-secondary { background-color: var(--primary-gold); color: var(--dark-text); }
        .btn-secondary:hover { background-color: #b5952f; }
        #error-message { color: red; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="login-box">
        <h1>PreDentTX</h1>
        <p>Secure Portal Login</p>

        <select id="user-role">
            <option value="student">I am a Predental Student</option>
            <option value="dentist">I am a Dentist / Orthodontist</option>
        </select>

        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        
        <button id="login-btn">Log In</button>
        <button id="signup-btn" class="btn-secondary">Create Account</button>
        
        <p id="error-message"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-auth.js";
        // Import Firestore tools to save and read user roles
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore.js";

        // *** PASTE YOUR SPECIFIC FIREBASE KEYS HERE ***
       // *** Your actual PreDentTX Keys ***
        const firebaseConfig = {
            apiKey: "AIzaSyBJbOnqR5OUm3NiUqTRkpKndg6wI2BJWyg",
            authDomain: "predenttx-a18a0.firebaseapp.com",
            projectId: "predenttx-a18a0",
            storageBucket: "predenttx-a18a0.firebasestorage.app",
            messagingSenderId: "858713059242",
            appId: "1:858713059242:web:c3ef0473986c727e5205d3",
            measurementId: "G-5HKM855YXP"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const roleInput = document.getElementById("user-role");
        const emailInput = document.getElementById("email");
        const passwordInput = document.getElementById("password");
        const errorMessage = document.getElementById("error-message");

        // Feature 1: Create Account & Save Role
        document.getElementById("signup-btn").addEventListener("click", async () => {
            const email = emailInput.value;
            const password = passwordInput.value;
            const role = roleInput.value;

            if (email === "" || password === "") {
                errorMessage.innerText = "Please fill in all fields.";
                return;
            }

            try {
                // 1. Create the Auth account
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. Save their specific role in the database under a "users" folder
                await setDoc(doc(db, "users", user.uid), {
                    email: email,
                    role: role
                });

                // 3. Send them to the right page
                if (role === "student") {
                    window.location.href = "student-profile.html";
                } else {
                    window.location.href = "dentist-dashboard.html";
                }
            } catch (error) {
                errorMessage.innerText = error.message;
            }
        });

        // Feature 2: Log In & Check Role
        document.getElementById("login-btn").addEventListener("click", async () => {
            const email = emailInput.value;
            const password = passwordInput.value;

            try {
                // 1. Log them in
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. Look up their role in the database
                const userDoc = await getDoc(doc(db, "users", user.uid));
                
                if (userDoc.exists()) {
                    const role = userDoc.data().role;
                    // 3. Redirect based on role
                    if (role === "student") {
                        window.location.href = "student-profile.html";
                    } else {
                        window.location.href = "dentist-dashboard.html";
                    }
                } else {
                    errorMessage.innerText = "User role not found in database.";
                }
            } catch (error) {
                errorMessage.innerText = "Wrong email or password.";
            }
        });
    </script>
</body>
</html>
