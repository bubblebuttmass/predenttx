<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PreDentTX | Sign In</title>
    <style>
        :root { --green: #0A5C36; --gold: #D4AF37; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #F8F9FA; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; border-top: 8px solid var(--green); }
        .logo { color: var(--green); font-size: 28px; font-weight: 700; text-decoration: none; display: block; margin-bottom: 6px; }
        .sub { color: #888; font-size: 14px; margin-bottom: 28px; }
        input { width: 100%; padding: 12px; margin-bottom: 14px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; font-size: 15px; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
        .btn-login { background: var(--green); color: white; }
        .btn-signup { background: var(--gold); color: #333; }
        button:disabled { background: #aaa; cursor: not-allowed; }
        .link { display: inline-block; margin-top: 6px; font-size: 13px; color: var(--green); cursor: pointer; text-decoration: underline; }
        #status { font-size: 13px; min-height: 18px; margin-top: 12px; }
        #status.error { color: #c0392b; }
        #status.success { color: var(--green); }
        .legal { font-size: 11px; color: #bbb; margin-top: 14px; }
        .legal a { color: var(--green); }
    </style>
</head>
<body>
<div class="box">
    <a href="index.html" class="logo">PreDentTX</a>
    <p class="sub">Student Portal</p>
    <input type="email" id="email" placeholder="Email address" autocomplete="email">
    <input type="password" id="password" placeholder="Password" autocomplete="current-password">
    <button class="btn-login" id="login-btn">Log In</button>
    <button class="btn-signup" id="signup-btn">Create Student Account</button>
    <a class="link" id="forgot-link">Forgot password?</a><br>
    <a class="link" id="resend-link" style="display:none;">Resend verification email</a>
    <p id="status"></p>
    <p class="legal">By creating an account you agree to our <a href="privacy.html">Privacy Policy</a> and <a href="privacy.html#terms">Terms of Service</a>.</p>
</div>
<script type="module">
    import { auth, db } from './firebase-config.js';
    import { signInWithEmailAndPassword, createUserWithEmailAndPassword, sendEmailVerification, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-auth.js";
    import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore.js";

    const ADMIN_UIDS = ["dIuXc604onXcz7OEEFdmNu8EGhJ3", "9VVH0EkxXpNO8dJKyP3C4dKmkbt1"];
    const emailEl = document.getElementById("email");
    const passwordEl = document.getElementById("password");
    const statusEl = document.getElementById("status");
    const resendLink = document.getElementById("resend-link");
    let pendingUser = null;

    function setStatus(msg, type) { statusEl.innerText = msg; statusEl.className = type || ""; }
    function setBusy(b) { document.getElementById("login-btn").disabled = b; document.getElementById("signup-btn").disabled = b; }

    document.getElementById("login-btn").addEventListener("click", async () => {
        const email = emailEl.value.trim();
        const password = passwordEl.value;
        if (!email || !password) { setStatus("Please fill in all fields.", "error"); return; }
        setBusy(true); setStatus("Logging in...");
        try {
            const cred = await signInWithEmailAndPassword(auth, email, password);
            const user = cred.user;
            if (!user.emailVerified) {
                setStatus("Please verify your email first. Check your inbox and spam folder.", "error");
                pendingUser = user; resendLink.style.display = "inline"; setBusy(false); return;
            }
            window.location.href = ADMIN_UIDS.includes(user.uid) ? "admin.html" : "student-profile.html";
        } catch { setStatus("Wrong email or password.", "error"); setBusy(false); }
    });

    document.getElementById("signup-btn").addEventListener("click", async () => {
        const email = emailEl.value.trim();
        const password = passwordEl.value;
        if (!email || !password) { setStatus("Please fill in all fields.", "error"); return; }
        if (password.length < 6) { setStatus("Password must be at least 6 characters.", "error"); return; }
        setBusy(true); setStatus("Creating account...");
        try {
            const cred = await createUserWithEmailAndPassword(auth, email, password);
            await setDoc(doc(db, "users", cred.user.uid), { email, role: "student" });
            await sendEmailVerification(cred.user);
            setStatus("Account created! Check your email to verify — check spam if you do not see it within a minute.", "success");
            emailEl.value = ""; passwordEl.value = "";
        } catch (err) { setStatus(err.message, "error"); }
        finally { setBusy(false); }
    });

    resendLink.addEventListener("click", async () => {
        if (!pendingUser) return;
        try { await sendEmailVerification(pendingUser); setStatus("Sent! Check your inbox and spam.", "success"); }
        catch (err) { setStatus(err.message, "error"); }
    });

    document.getElementById("forgot-link").addEventListener("click", async () => {
        const email = emailEl.value.trim();
        if (!email) { setStatus("Enter your email above first.", "error"); return; }
        try { await sendPasswordResetEmail(auth, email); setStatus("Password reset link sent!", "success"); }
        catch (err) { setStatus(err.message, "error"); }
    });
</script>
</body>
</html>
